{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud Enviada</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        body {
            background: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-success {
            border-radius: 1rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            padding: 2rem;
            box-shadow: 0 0.5rem 1.5rem rgba(0,0,0,0.1);
            background: #ffffff;
            animation: fadeIn 0.8s ease-in-out;
        }

        .card-success i.icon-success {
            font-size: 3rem;
            color: #198754;
            margin-bottom: 1rem;
        }

        .card-success h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .card-success p {
            color: #6c757d;
            margin-bottom: 2rem;
        }

        .btn-home {
            border-radius: 50px;
            padding: 0.6rem 2rem;
            font-weight: 500;
            display: inline-flex;          /* Flex para alinear icono y texto */
            align-items: center;           /* Centrado vertical */
            gap: 0.5rem;                   /* Espacio entre icono y texto */
        }

        .btn-home i {
            min-width: 1.25rem;            /* Ancho fijo para que el icono no se mueva */
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="card-success">
        <i class="bi bi-check-circle-fill icon-success"></i>
        <h1>¡Solicitud enviada con éxito!</h1>
        <p>Su solicitud ha sido cargada correctamente. <br>Debe esperar a que un Administrador revise su ficha y le dé de alta.</p>
        <a href="{% url 'home' %}" class="btn btn-success btn-home">
            <i class="bi bi-house-door-fill"></i>Volver a Web
        </a>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
