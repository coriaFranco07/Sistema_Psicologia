{% extends "base.html" %} {% block content %}
<div class="container mt-5" style="max-width: 600px">
  <div class="card shadow-sm">
    <div class="card-header bg-danger text-white">
      <h5 class="mb-0">Observaciones de {{ pendiente.payload.nombres }}</h5>
    </div>
    <div class="card-body">
      {% if motivo_rechazo %}
      <p>{{ motivo_rechazo }}</p>
      {% else %}
      <p class="text-muted">
        No hay motivo de rechazo registrado para este usuario pendiente.
      </p>
      {% endif %}

      <div class="mt-3 text-end">
        <a href="{% url 'usuario:pendientes_list' %}" class="btn btn-secondary">
          Volver
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
