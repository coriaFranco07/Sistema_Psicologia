{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            {% if object %}
                <h4><i class="fas fa-edit"></i> Editar Tipo Documento</h4>
            {% else %}
                <h4><i class="fas fa-plus"></i> Crear Tipo Documento</h4>
            {% endif %}
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    {{ form.nombre }}
                </div>

                <hr>

                <!-- Editable -->
<div class="form-check form-switch mb-3">

    <input 
        class="form-check-input"
        type="checkbox"
        name="is_editable"
        id="id_is_editable"
        {% if form.is_editable.value %}checked{% endif %}
    >

    <label class="form-check-label ms-2" for="id_is_editable">
        <h4>Editable</h4>
    </label>

</div>


<div class="form-check form-switch mb-4">

    <input 
        class="form-check-input"
        type="checkbox"
        name="estado"
        id="id_estado"
        {% if form.estado.value %}checked{% endif %}
    >

    <label class="form-check-label ms-2" for="id_estado">
        <h4>Estado</h4>  
    </label>

</div>

                <div class="d-flex justify-content-between">

                    <a href="{% url 'usuario:tipo_documento_list' %}"
                       class="btn btn-outline-secondary">

                       <i class="fas fa-arrow-left"></i> Volver
                    </a>

                    <button type="submit" class="btn btn-success">

                        <i class="fas fa-save"></i>

                        {% if object %}
                            Actualizar
                        {% else %}
                            Guardar
                        {% endif %}

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
