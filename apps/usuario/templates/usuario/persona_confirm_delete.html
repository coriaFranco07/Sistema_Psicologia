{% extends "usuario/base.html" %}

{% block title %}Eliminar {{ entity_label }}{% endblock %}

{% block content %}
<section class="card">
    <h2>Eliminar {{ entity_label }}</h2>
    <p>¿Seguro que querés eliminar a <strong>{{ persona }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Confirmar eliminación</button>
        <a class="btn btn-secondary" href="{{ cancel_url }}">Cancelar</a>
    </form>
</section>
{% endblock %}
