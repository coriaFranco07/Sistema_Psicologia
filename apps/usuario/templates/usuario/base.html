{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Sistema Psicologia{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/psicologia_app.css' %}">
</head>
<body class="app-body">
    <div class="app-shell">
        <aside class="app-sidebar">
            <a href="{% url 'usuario:dashboard' %}" class="app-brand">
                <span class="app-brand-mark">SP</span>
                <span>
                    <strong>Sistema Psicologia</strong>
                    <small>Gestion profesional</small>
                </span>
            </a>

            <nav class="app-nav">
                <a href="{% url 'usuario:dashboard' %}" class="app-nav-link">Dashboard</a>
                <a href="{% url 'usuario:psicologo_list' %}" class="app-nav-link">Psicologos</a>
                <a href="{% url 'usuario:paciente_list' %}" class="app-nav-link">Pacientes</a>
                <a href="/admin/" class="app-nav-link">Admin Django</a>
            </nav>
        </aside>

        <main class="app-main">
            {% if messages %}
                <div class="app-messages">
                    {% for message in messages %}
                        <div class="app-message app-message-{{ message.tags|default:'info' }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
