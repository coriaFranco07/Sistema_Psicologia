<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Sistema Psicologia{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }
        header {
            background: #1d4ed8;
            color: white;
            padding: 16px 24px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-right: 16px;
        }
        main {
            max-width: 1100px;
            margin: 24px auto;
            padding: 0 16px;
        }
        .card {
            background: white;
            border: 1px solid #dbe3ef;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 18px;
        }
        .messages {
            margin-bottom: 16px;
        }
        .message {
            background: #e8f0ff;
            border: 1px solid #c7d7ff;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
            vertical-align: top;
        }
        form p {
            margin-bottom: 12px;
        }
        input, select, textarea, button {
            font: inherit;
        }
        button, .btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            text-decoration: none;
            cursor: pointer;
        }
        .btn-secondary {
            background: #6b7280;
        }
        .actions a {
            margin-right: 10px;
        }
        .app-input,
        .app-select,
        .app-textarea {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            background: #ffffff;
            box-sizing: border-box;
        }
        .app-input:focus,
        .app-select:focus,
        .app-textarea:focus {
            outline: 2px solid rgba(37, 99, 235, 0.18);
            border-color: #2563eb;
        }
        .errorlist {
            margin: 8px 0 0;
            padding-left: 18px;
            color: #b91c1c;
        }
        .helptext {
            display: block;
            margin-top: 6px;
            color: #64748b;
            font-size: 0.88rem;
            line-height: 1.4;
        }
        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    {% block page_header %}
    <header>
        <h1 style="margin:0 0 10px;">Sistema Psicologia</h1>
        <nav>
            <a href="/">Login</a>
            <a href="/psicologos/">Psicologos</a>
            <a href="/pacientes/">Pacientes</a>
            <a href="/logout/">Salir</a>
        </nav>
    </header>
    {% endblock %}

    <main class="{% block main_class %}{% endblock %}">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
